<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Website - Auth</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .toggle {
      margin-top: 10px;
      cursor: pointer;
      color: #38bdf8;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="title">Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="handleAuth()">Submit</button>

  <p class="toggle" onclick="toggleMode()">Don't have an account? Sign up</p>
</div>

<script>
  let isLogin = true;

  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
    document.querySelector(".toggle").innerText = isLogin 
      ? "Don't have an account? Sign up"
      : "Already have an account? Login";
  }

  function handleAuth() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (!user || !pass) {
      alert("Please fill all fields");
      return;
    }

    if (isLogin) {
      alert("Login successful (demo)");
    } else {
      alert("Signup successful (demo)");
    }
  }
</script>

</body>
</html>
